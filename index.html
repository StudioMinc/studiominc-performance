<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Minc — Performance</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --cream:#FAF8F4;--bone:#F2EFE8;--linen:#E8E2D9;--taupe:#C4BAA8;--warm:#8C7E6A;--deep:#3D3329;--ink:#1C1710;
  --sage:#5C7055;--sage-l:#E8F3E8;--gold:#C9A84C;--gold-l:#F0E4C0;--danger:#C45050;--danger-l:#F5E0E0;
  --amber:#8A7000;--amber-l:#FFF4D9;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;font-size:13px;}

/* NAV */
.nav{background:var(--ink);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:300;}
.nav-brand{font-family:'Century Gothic','CenturyGothic','AppleGothic',sans-serif;font-size:12px;font-weight:400;letter-spacing:.28em;text-transform:uppercase;color:var(--cream);cursor:pointer;}
.nav-brand em{font-size:9px;letter-spacing:.2em;color:#888;margin-left:10px;font-style:normal;}
.nav-r{display:flex;align-items:center;gap:8px;}
.nb{padding:5px 12px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-family:'Century Gothic','CenturyGothic',sans-serif;cursor:pointer;border:1px solid rgba(255,255,255,.2);background:transparent;color:var(--cream);transition:all .15s;}
.nb:hover{background:rgba(255,255,255,.08);}
.nb-gold{background:var(--cream);border-color:var(--cream);color:var(--ink);font-weight:700;}
.nav-month select,.nav-month input{padding:4px 8px;border:1px solid rgba(255,255,255,.2);font-size:11px;font-family:'DM Sans',sans-serif;background:rgba(255,255,255,.07);color:var(--cream);}
.nav-month select option{background:#1C1710;}
.nav-month{display:flex;align-items:center;gap:6px;}

/* PAGES */
.page{display:none;}.page.on{display:block;}

/* HOME */
.home-wrap{padding:28px 28px 80px;}
.home-hdr{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;}
.home-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;}
.home-sub{font-size:11px;color:var(--warm);margin-top:3px;}

/* AREA MANAGER BANNER */
.am-banner{background:var(--ink);border-radius:10px;padding:16px 20px;margin-bottom:28px;display:flex;align-items:center;gap:16px;}
.am-av{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--cream);overflow:hidden;flex-shrink:0;}
.am-av img{width:100%;height:100%;object-fit:cover;}
.am-name{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--cream);font-weight:300;}
.am-role{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-top:2px;}
.am-stats{margin-left:auto;display:flex;gap:20px;}
.am-stat{text-align:center;}
.am-sv{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--cream);line-height:1;}
.am-sl{font-size:8px;color:#888;text-transform:uppercase;letter-spacing:.1em;margin-top:2px;}

/* SHOWROOM SECTION */
.showroom-sec{margin-bottom:32px;}
.showroom-hdr{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.showroom-nm{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--warm);}
.showroom-ln{flex:1;height:1px;background:var(--linen);}
.showroom-meta{font-size:10px;color:var(--taupe);}
.cards-row{display:flex;flex-wrap:wrap;gap:12px;}

/* STAFF CARD */
.sc{width:148px;border-radius:10px;overflow:hidden;background:white;border:1px solid var(--linen);cursor:pointer;transition:transform .15s,box-shadow .15s;flex-shrink:0;}
.sc:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(28,23,16,.1);}
.sc-photo{width:100%;height:148px;background:var(--bone);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.sc-photo img{width:100%;height:100%;object-fit:cover;}
.sc-ini{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:300;color:var(--taupe);}
.cr-pill{position:absolute;bottom:7px;left:7px;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;color:white;}
.p-ex{background:rgba(92,112,85,.92);}
.p-gd{background:rgba(138,112,0,.88);}
.p-nw{background:rgba(196,80,80,.9);}
.p-none{background:rgba(28,23,16,.4);}
.sc-info{padding:9px 11px 11px;}
.sc-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc-role-lbl{font-size:9px;color:var(--warm);margin-top:1px;letter-spacing:.04em;}
.sc-split{display:flex;justify-content:space-between;margin-top:7px;}
.sc-si{text-align:center;}
.sc-sv{font-family:'Cormorant Garamond',serif;font-size:16px;line-height:1;}
.sc-sl{font-size:8px;color:var(--taupe);text-transform:uppercase;letter-spacing:.06em;margin-top:1px;}
.sc-div{width:1px;background:var(--linen);}
.sc-trend{display:inline-flex;align-items:center;gap:3px;font-size:9px;padding:2px 7px;border-radius:20px;margin-top:5px;}
.t-up{background:var(--sage-l);color:var(--sage);}
.t-dn{background:var(--danger-l);color:var(--danger);}
.t-fl{background:var(--bone);color:var(--warm);}
.add-card{width:148px;height:214px;border-radius:10px;border:1.5px dashed var(--linen);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:6px;transition:all .15s;flex-shrink:0;}
.add-card:hover{border-color:var(--gold);background:var(--gold-l);}
.add-card span{font-size:22px;color:var(--taupe);}
.add-card p{font-size:10px;color:var(--taupe);text-align:center;}
.add-card:hover span,.add-card:hover p{color:#7A5A00;}

/* PROFILE */
.prof-topbar{background:white;border-bottom:1px solid var(--linen);padding:12px 28px;display:flex;align-items:center;gap:12px;}
.back{font-size:12px;color:var(--warm);cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;padding:0;}
.back:hover{color:var(--ink);}
.prof-av{width:40px;height:40px;border-radius:50%;background:var(--bone);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.prof-av img{width:100%;height:100%;object-fit:cover;}
.prof-av .pini{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:300;color:var(--warm);}
.prof-nm{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;}
.prof-meta{font-size:10px;color:var(--warm);margin-top:1px;}
.prof-tabs{display:flex;gap:0;margin-left:auto;}
.prof-tab{padding:6px 16px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:1px solid var(--linen);background:white;color:var(--warm);font-family:'DM Sans',sans-serif;transition:all .15s;}
.prof-tab:first-child{border-radius:6px 0 0 6px;}
.prof-tab:last-child{border-radius:0 6px 6px 0;}
.prof-tab.active{background:var(--ink);color:var(--cream);border-color:var(--ink);}
.prof-wrap{display:flex;min-height:calc(100vh - 52px - 58px);}

/* HISTORY PANEL */
.prof-history{width:260px;flex-shrink:0;border-right:1px solid var(--linen);background:white;overflow-y:auto;}
.ph-header{padding:14px 16px 10px;border-bottom:1px solid var(--bone);}
.ph-title{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--warm);margin-bottom:1px;}
.ph-sub{font-size:10px;color:var(--taupe);}
.ph-month{padding:10px 16px;border-bottom:1px solid var(--bone);cursor:pointer;transition:background .12s;}
.ph-month:hover{background:var(--cream);}
.ph-month.active{background:var(--gold-l);border-left:3px solid var(--gold);}
.phm-nm{font-size:12px;font-weight:500;color:var(--ink);margin-bottom:4px;}
.phm-cr{font-family:'Cormorant Garamond',serif;font-size:17px;line-height:1;}
.phm-lbl{font-size:8px;color:var(--taupe);text-transform:uppercase;letter-spacing:.08em;margin-top:1px;}
.phm-row{display:flex;gap:10px;align-items:center;}
.phm-stars{margin-left:auto;display:flex;gap:1px;}
.ms{font-size:11px;color:var(--linen);cursor:pointer;}
.ms.on{color:var(--gold);}
.ph-week-list{padding:8px 16px;border-bottom:1px solid var(--bone);}
.ph-week{display:flex;align-items:center;justify-content:space-between;padding:4px 0;font-size:11px;cursor:pointer;color:var(--warm);}
.ph-week:hover{color:var(--ink);}
.ph-week.done{color:var(--sage);}
.ph-week.done::after{content:'✓';font-size:9px;}
.ph-add-btn{width:calc(100% - 32px);margin:10px 16px;padding:7px;border:1.5px dashed var(--linen);background:transparent;font-size:11px;color:var(--taupe);cursor:pointer;font-family:'DM Sans',sans-serif;border-radius:6px;transition:all .15s;}
.ph-add-btn:hover{border-color:var(--gold);color:#7A5A00;background:var(--gold-l);}

/* REVIEW CONTENT */
.prof-review{flex:1;overflow-y:auto;background:var(--cream);}
.review-content{padding:24px 28px 80px;}
.rev-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:60px 40px;text-align:center;}
.rev-placeholder h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--deep);margin-bottom:8px;}
.rev-placeholder p{font-size:12px;color:var(--warm);line-height:1.7;}

/* REVIEW SECTIONS */
.rsec{margin-bottom:24px;}
.rsec-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.rsec-title{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:400;color:var(--deep);}
.rsec-line{flex:1;height:1px;background:var(--linen);}
.rcard{background:white;border:1px solid var(--linen);border-radius:8px;padding:14px 16px;}

/* WEEK SELECTOR */
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:20px;background:white;border:1px solid var(--linen);border-radius:8px;padding:10px 14px;}
.week-nav-title{font-size:11px;font-weight:500;color:var(--deep);}
.week-tabs{display:flex;gap:4px;margin-left:auto;}
.wk-tab{padding:4px 12px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:1px solid var(--linen);background:var(--bone);color:var(--warm);font-family:'DM Sans',sans-serif;border-radius:20px;transition:all .12s;}
.wk-tab.active{background:var(--ink);color:var(--cream);border-color:var(--ink);}
.wk-tab.done{border-color:var(--sage);color:var(--sage);}
.wk-tab.active.done{background:var(--sage);color:white;border-color:var(--sage);}

/* STAT CARDS */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:18px;}
.scard{background:white;border:1px solid var(--linen);border-radius:8px;padding:11px 13px;}
.scard-lbl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--warm);margin-bottom:3px;}
.scard-val{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;line-height:1;}
.scard-sub{font-size:10px;color:var(--warm);margin-top:2px;}
.bdg{display:inline-block;font-size:9px;padding:2px 7px;border-radius:20px;margin-top:3px;}
.b-ex{background:var(--sage-l);color:#2E6B2E;}
.b-gd{background:var(--amber-l);color:var(--amber);}
.b-nw{background:var(--danger-l);color:var(--danger);}

/* WEEKLY GRID — sales process */
.weekly-grid{width:100%;border-collapse:collapse;font-size:11px;}
.weekly-grid th{padding:6px 8px;text-align:left;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--warm);font-weight:500;border-bottom:1px solid var(--linen);}
.weekly-grid td{padding:7px 8px;border-bottom:1px solid var(--bone);vertical-align:middle;}
.weekly-grid tr:last-child td{border-bottom:none;}
.weekly-grid .step-nm{font-size:12px;color:var(--deep);font-weight:500;}
.weekly-grid .step-ds{font-size:10px;color:var(--warm);}
.rat-btns{display:flex;gap:3px;}
.rb{padding:2px 8px;font-size:9px;border:1px solid var(--linen);background:var(--bone);cursor:pointer;color:var(--warm);border-radius:20px;font-family:'DM Sans',sans-serif;transition:all .1s;white-space:nowrap;}
.rb.r-ex{background:var(--sage-l);border-color:var(--sage);color:var(--sage);}
.rb.r-gd{background:var(--amber-l);border-color:var(--amber);color:var(--amber);}
.rb.r-nw{background:var(--danger-l);border-color:var(--danger);color:var(--danger);}

/* FUND GRID */
.fund-grid{display:flex;flex-direction:column;gap:5px;}
.fi{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border:1px solid var(--linen);border-radius:6px;background:white;gap:10px;}
.fi-lbl{font-size:12px;color:var(--deep);flex:1;}
.fi-togs{display:flex;gap:4px;flex-shrink:0;}
.ftog{padding:3px 8px;border-radius:20px;font-size:9px;border:1px solid var(--linen);background:var(--bone);cursor:pointer;color:var(--warm);font-family:'DM Sans',sans-serif;white-space:nowrap;}
.ftog.f-ex{background:var(--sage-l);border-color:var(--sage);color:var(--sage);font-weight:600;}
.ftog.f-nt{background:#EEF0F8;border-color:#7A82B0;color:#4A5280;font-weight:600;}
.ftog.f-nw{background:var(--danger-l);border-color:var(--danger);color:var(--danger);font-weight:600;}

/* MONTHLY AVERAGES */
.avg-table{width:100%;border-collapse:collapse;}
.avg-table th{padding:5px 8px;text-align:left;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--warm);border-bottom:1px solid var(--linen);}
.avg-table td{padding:6px 8px;border-bottom:1px solid var(--bone);font-size:11px;vertical-align:middle;}
.avg-table tr:last-child td{border-bottom:none;}
.wk-dot{display:inline-block;width:20px;height:20px;border-radius:50%;font-size:9px;font-weight:700;text-align:center;line-height:20px;}
.wd-ex{background:var(--sage-l);color:var(--sage);}
.wd-gd{background:var(--amber-l);color:var(--amber);}
.wd-nw{background:var(--danger-l);color:var(--danger);}
.wd-blank{background:var(--bone);color:var(--taupe);}
.avg-pill{padding:2px 10px;border-radius:20px;font-size:10px;font-weight:500;}

/* LOST SALE PATTERNS */
.lp-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bone);cursor:pointer;user-select:none;transition:background .1s;}
.lp-row:last-child{border-bottom:none;}
.lp-row:hover{background:var(--cream);}
.lp-row.checked{background:var(--danger-l);}
.lp-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--linen);background:white;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--danger);font-weight:700;flex-shrink:0;margin-top:1px;}
.lp-row.checked .lp-check{background:var(--danger);border-color:var(--danger);color:white;}
.lp-body{flex:1;}
.lp-label{font-size:12px;color:var(--deep);}
.lp-teach{font-size:10px;color:var(--warm);margin-top:2px;}
.lp-row.checked .lp-label{color:var(--danger);}
.lp-actions{margin-top:8px;padding:10px 12px;background:rgba(196,80,80,.06);border-radius:6px;border-left:3px solid var(--danger);}
.lp-act-title{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--danger);font-weight:700;margin-bottom:6px;}
.lp-act-item{font-size:11px;color:var(--warm);line-height:1.6;margin-bottom:2px;}
.lp-act-quote{font-size:12px;color:var(--deep);font-style:italic;border-left:2px solid var(--danger);padding-left:8px;margin:5px 0;}

/* AI PANEL */
.ai-panel{background:var(--ink);border-radius:10px;padding:20px 22px;color:var(--cream);}
.ai-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.ai-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;}
.ai-badge{font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(201,168,76,.4);padding:2px 7px;border-radius:20px;}
.ai-txt{font-size:13px;line-height:1.85;color:rgba(250,248,244,.85);white-space:pre-wrap;}
.ai-dots span{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--taupe);margin:0 2px;animation:pls 1.2s infinite;}
.ai-dots span:nth-child(2){animation-delay:.2s;}
.ai-dots span:nth-child(3){animation-delay:.4s;}
@keyframes pls{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.ai-acts{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap;}
.ai-btn{padding:6px 12px;border-radius:6px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:var(--cream);transition:all .15s;}
.ai-btn:hover{background:rgba(255,255,255,.12);}
.ai-btn-gold{background:var(--gold);border-color:var(--gold);color:var(--ink);font-weight:500;}
.ai-btn-gold:hover{background:#b5943f;}
.ai-editor{width:100%;min-height:120px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:10px;font-size:13px;line-height:1.85;color:rgba(250,248,244,.9);font-family:'DM Sans',sans-serif;resize:vertical;}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:7px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid var(--linen);background:white;color:var(--deep);transition:all .15s;}
.btn:hover{background:var(--bone);}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-ink{background:var(--ink);color:var(--cream);border-color:var(--ink);}
.btn-ink:hover{background:var(--deep);}
.btn-gold{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:500;}
.btn-gold:hover{background:#b5943f;}
.btn-danger{background:white;color:var(--danger);border-color:var(--danger);}

/* MODALS */
.modal-bg{position:fixed;inset:0;background:rgba(28,23,16,.6);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:white;border-radius:12px;padding:24px 26px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;}
.modal h2{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;margin-bottom:16px;}
.fg{margin-bottom:12px;}
.fg label{font-size:11px;color:var(--warm);display:block;margin-bottom:4px;}
.fg input,.fg select{width:100%;border:1px solid var(--linen);border-radius:6px;padding:7px 10px;font-size:12px;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--taupe);}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.photo-drop{width:100%;height:90px;border:1.5px dashed var(--linen);border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:4px;transition:all .15s;}
.photo-drop:hover{border-color:var(--gold);background:var(--gold-l);}
.photo-drop img{width:60px;height:60px;border-radius:50%;object-fit:cover;}
.photo-drop p{font-size:10px;color:var(--warm);}

/* STATUS BAR */
.supa-bar{background:var(--ink);border-top:1px solid rgba(255,255,255,.06);padding:6px 28px;display:flex;align-items:center;gap:10px;position:fixed;bottom:0;width:100%;z-index:200;}
.sd{font-size:10px;}
.sd.ok{color:#6BBF6B;}
.sd.no{color:var(--danger);}
.slnk{font-size:10px;color:var(--taupe);cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;text-decoration:underline;}

/* WEEKLY SAVE BUTTON */
.week-save-bar{position:sticky;bottom:48px;background:var(--cream);border-top:1px solid var(--linen);padding:10px 28px;display:flex;align-items:center;justify-content:space-between;z-index:100;}
.week-save-info{font-size:11px;color:var(--warm);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--linen);border-radius:2px;}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-brand" onclick="showHome()">STUDIO &nbsp; MINC <em>Performance</em></div>
  <div class="nav-r">
    <div class="nav-month">
      <select id="navMonth" onchange="onMonthChange()"></select>
      <input type="number" id="navYear" value="2026" min="2024" max="2030" onchange="onMonthChange()" style="width:64px;">
    </div>
    <button class="nb" onclick="manualSync()">↻ Sync</button>
    <button class="nb nb-gold" onclick="openSupaModal()">Supabase</button>
  </div>
</nav>

<!-- HOME PAGE -->
<div class="page on" id="homePage">
  <div class="home-wrap">
    <div class="home-hdr">

// ═══════════════════════════════════════════════
// STATE

let S={
  staff:[],      // [{id,name,role,store,phone,photo}]
  reviews:{},    // key: id_year_month → {weeks:{1:{proc,fund},2,3,4}, ai, aiTeam, lostPatterns, lostNote, stars}

// ═══════════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════════
function rvk(id,y,m){return `${id}_${y}_${String(m).padStart(2,'0')}`;}

function sv(){
  const reviewsToSave={};
  Object.entries(S.reviews).forEach(([k,rev])=>{
    const clean={};
    Object.keys(rev).forEach(key=>{if(key!=='lostReasonCounts')clean[key]=rev[key];});
    reviewsToSave[k]=clean;
  });
  const staffToSave=S.staff.map(s=>{
    const sc=Object.assign({},s);
    if(sc.photo&&sc.photo.length>100){
      try{localStorage.setItem('sm_photo_'+sc.id,sc.photo);}catch(e){}
      sc.photo='__has_photo__';
    }
    return sc;
  });
  try{
    localStorage.setItem(DK,JSON.stringify({staff:staffToSave,reviews:reviewsToSave}));
  }catch(e){
    try{
      localStorage.setItem(DK,JSON.stringify({staff:staffToSave.map(s=>({...s,photo:null})),reviews:reviewsToSave}));
    }catch(e2){console.warn('localStorage full');}
  }
}

function ld(){
  try{
    const d=JSON.parse(localStorage.getItem(DK)||'{}');
    S.staff=d.staff||[];
    S.staff.forEach(s=>{
      if(s.photo==='__has_photo__'){
        const p=localStorage.getItem('sm_photo_'+s.id);
        s.photo=p||null;
      }
    });
    S.reviews=d.reviews||{};
  }catch(e){}
}

function getMk(id,y,m){
  const k=rvk(id,y,m);
  if(!S.reviews[k])S.reviews[k]={weeks:{},lostPatterns:{},lostNote:'',stars:0};
  if(!S.reviews[k].weeks)S.reviews[k].weeks={};
  return S.reviews[k];
}

function curRev(){return getMk(S.curId,S.curYear,S.curMonth);}

function getWeek(id,y,m,wk){
  const rev=getMk(id,y,m);
  if(!rev.weeks[wk])rev.weeks[wk]={proc:{},fund:{}};
  return rev.weeks[wk];
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function crCalc(a,s){
  const fa=parseFloat(a)||0,fs=parseFloat(s)||0;
  return fa>0?Math.round(fs/fa*100):null;
}
function blended(rev){
  const fa=parseFloat(rev.fA)||0,fs=parseFloat(rev.fS)||0;
  const ba=parseFloat(rev.bA)||0,bs=parseFloat(rev.bS)||0;
  const t=fa+ba;
  return t>0?Math.round((fs+bs)/t*100):null;
}
function crColor(v){
  if(v===null)return'var(--taupe)';
  if(v>=65)return'var(--sage)';
  if(v>=50)return'var(--amber)';
  return'var(--danger)';
}
function crBgColor(v){
  if(v===null)return'var(--bone)';
  if(v>=65)return'var(--sage-l)';
  if(v>=50)return'var(--amber-l)';
  return'var(--danger-l)';
}
function crPillClass(v){
  if(v===null)return'p-none';
  if(v>=65)return'p-ex';
  if(v>=50)return'p-gd';
  return'p-nw';
}
function badg(v){
  if(v===null)return'';
  if(v>=65)return`<span class="bdg b-ex">Excellent</span>`;
  if(v>=50)return`<span class="bdg b-gd">On Track</span>`;
  return`<span class="bdg b-nw">Needs Attention</span>`;
}

// Average weekly ratings
function avgRating(id,y,m,type,key){
  const rev=getMk(id,y,m);
  const vals=[];
  [1,2,3,4].forEach(wk=>{
    const w=rev.weeks[wk];
    if(w&&w[type]&&w[type][key])vals.push(w[type][key]);
  });
  if(!vals.length)return null;
  const map={'ex':3,'gd':2,'nw':1};
  const avg=vals.reduce((s,v)=>s+(map[v]||0),0)/vals.length;
  if(avg>=2.5)return'ex';
  if(avg>=1.5)return'gd';
  return'nw';
}

function weekDone(id,y,m,wk){
  const w=getMk(id,y,m).weeks[wk];
  if(!w)return false;
  const procFilled=STEPS.some(st=>w.proc&&w.proc[st.key]);
  return procFilled;
}

function showHome(){

  document.getElementById('profilePage').classList.remove('on');

  renderHome();

function renderHome(){
  document.getElementById('homeSub').textContent=`${MONTHS[S.curMonth-1]} ${S.curYear} · Click a staff member to open their profile`;
  const container=document.getElementById('homeContent');
  let html='';

  // Area Manager banner
  const am=S.staff.find(s=>s.role==='Area Manager');
  if(am){
    const amRevs=S.staff.filter(s=>s.role!=='Area Manager').map(s=>getMk(s.id,S.curYear,S.curMonth));
    const totalA=amRevs.reduce((t,r)=>(t+(parseFloat(r.fA)||0)+(parseFloat(r.bA)||0)),0);
    const totalS=amRevs.reduce((t,r)=>(t+(parseFloat(r.fS)||0)+(parseFloat(r.bS)||0)),0);
    const networkCR=totalA>0?Math.round(totalS/totalA*100):null;
    const ini=am.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    const teamLeaders=S.staff.filter(s=>s.role==='Team Leader').length;
    html+=`<div class="am-banner" onclick="openProfile('${am.id}')" style="cursor:pointer;position:relative;overflow:hidden;">
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),#E8C86A,var(--gold));"></div>
      <div class="am-av">${am.photo?`<img src="${am.photo}">`:`${ini}`}</div>
      <div>
        <div class="am-name">${am.name}</div>
        <div class="am-role">⭑ Area Manager · All Stores</div>
      </div>
      <div class="am-stats">
        <div class="am-stat"><div class="am-sv" style="color:${crColor(networkCR)}">${networkCR!==null?networkCR+'%':'—'}</div><div class="am-sl">Network CR</div></div>
        <div class="am-stat"><div class="am-sv">${totalA}</div><div class="am-sl">Total Appts</div></div>
        <div class="am-stat"><div class="am-sv">${S.staff.filter(s=>s.role==='Casual Stylist').length}</div><div class="am-sl">Stylists</div></div>
        <div class="am-stat"><div class="am-sv">${teamLeaders}</div><div class="am-sl">Team Leaders</div></div>
      </div>
    </div>`;
  }

  // Showrooms
  STORES.forEach(store=>{
    const storeStaff=S.staff
      .filter(s=>s.store===store&&s.role!=='Area Manager')
      .sort((a,b)=>{
        if(a.role==='Team Leader'&&b.role!=='Team Leader')return -1;
        if(b.role==='Team Leader'&&a.role!=='Team Leader')return 1;
        return 0;
      });
    if(!storeStaff.length&&!S.staff.some(s=>s.store===store))return;

    // Store CR
    const storeRevs=storeStaff.map(s=>getMk(s.id,S.curYear,S.curMonth));
    const stA=storeRevs.reduce((t,r)=>(t+(parseFloat(r.fA)||0)+(parseFloat(r.bA)||0)),0);
    const stS=storeRevs.reduce((t,r)=>(t+(parseFloat(r.fS)||0)+(parseFloat(r.bS)||0)),0);
    const stCR=stA>0?Math.round(stS/stA*100):null;

    html+=`<div class="showroom-sec">
      <div class="showroom-hdr">
        <span class="showroom-nm">${store}</span>
        <div class="showroom-ln"></div>
        <span class="showroom-meta">${storeStaff.length} staff${stCR!==null?` · Team avg ${stCR}% CR`:''}</span>
      </div>
      <div class="cards-row">
        ${storeStaff.map(s=>renderCard(s)).join('')}
        <div class="add-card" onclick="openAddStaff('${store}')">
          <span>+</span><p>Add to<br>${store}</p>
        </div>
      </div>
    </div>`;
  });

  if(!am&&S.staff.length===0){
    html=`<div style="text-align:center;padding:60px 20px;color:var(--warm);">
      <p style="font-size:14px;margin-bottom:8px;">No staff added yet</p>
      <p style="font-size:11px;">Click Sync to load from Supabase, or + Add Staff to begin</p>
    </div>`;
  }

  container.innerHTML=html;
}

function renderCard(s){
  const rev=getMk(s.id,S.curYear,S.curMonth);
  const bld=blended(rev);
  const fC=crCalc(rev.fA,rev.fS);
  const bC=crCalc(rev.bA,rev.bS);
  const ini=s.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  const isLeader=s.role==='Team Leader';

  const splitEl=fC!==null&&bC!==null&&(parseFloat(rev.bA)||0)>0?`
    <div class="sc-split">
      <div class="sc-si"><div class="sc-sv">${fC}%</div><div class="sc-sl">Formal</div></div>
      <div class="sc-div"></div>
      <div class="sc-si"><div class="sc-sv">${bC}%</div><div class="sc-sl">Bridal</div></div>
    </div>`:fC!==null?`
    <div style="margin-top:6px;"><div class="sc-sv">${fC}%</div><div class="sc-sl">Formal</div></div>`:
    bld===null?`<div style="font-size:10px;color:var(--taupe);margin-top:5px;">No data yet</div>`:'';

  if(isLeader){
    return `<div class="sc" onclick="openProfile('${s.id}')" style="border:2px solid var(--gold);position:relative;">
      <div style="position:absolute;top:8px;right:8px;z-index:2;background:var(--gold);color:var(--ink);font-size:8px;font-weight:700;letter-spacing:.1em;padding:2px 7px;border-radius:20px;text-transform:uppercase;">Team Leader</div>
      <div class="sc-photo" style="background:var(--gold-l);">
        ${s.photo?`<img src="${s.photo}">`:`<div class="sc-ini" style="color:var(--gold);">${ini}</div>`}
        ${bld!==null?`<div class="cr-pill ${crPillClass(bld)}">${bld}%</div>`:''}
      </div>
      <div class="sc-info" style="background:white;">
        <div class="sc-name" style="font-weight:600;">${s.name}</div>
        <div class="sc-role-lbl" style="color:var(--gold);">Team Leader</div>
        ${splitEl}
      </div>
    </div>`;
  }

  return `<div class="sc" onclick="openProfile('${s.id}')">
    <div class="sc-photo">
      ${s.photo?`<img src="${s.photo}">`:`<div class="sc-ini">${ini}</div>`}
      ${bld!==null?`<div class="cr-pill ${crPillClass(bld)}">${bld}%</div>`:''}
    </div>
    <div class="sc-info">
      <div class="sc-name">${s.name}</div>
      <div class="sc-role-lbl">${s.role||'Casual Stylist'}</div>
      ${splitEl}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════
function openProfile(id){
  S.curId=id;
  S.curWeek=getCurrentWeek();
  const s=S.staff.find(x=>x.id===id);
  // Area Manager goes straight to Review tab; everyone else starts on Weekly
  S.curTab=s?.role==='Area Manager'?'monthly':'weekly';
  document.getElementById('homePage').classList.remove('on');
  document.getElementById('profilePage').classList.add('on');
  renderProfile();
}

function getCurrentWeek(){
  // Find the first incomplete week, fallback to calendar-based week
  if(S.curId){
    for(let wk=1;wk<=4;wk++){
      if(!weekDone(S.curId,S.curYear,S.curMonth,wk))return wk;
    }
    return 4; // all done, show week 4
  }
  const day=new Date().getDate();
  if(day<=7)return 1;
  if(day<=14)return 2;
  if(day<=21)return 3;
  return 4;
}

function renderProfile(){
  const s=S.staff.find(x=>x.id===S.curId); if(!s)return;
  const ini=s.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();

  // Header
  document.getElementById('profAv').innerHTML=s.photo?`<img src="${s.photo}">`:`<div class="pini">${ini}</div>`;
  document.getElementById('profNm').textContent=s.name;
  document.getElementById('profMeta').textContent=`${s.role||'Casual Stylist'} · ${s.store}`;

  // Tabs — Area Manager has no weekly tab
  const isAM=s.role==='Area Manager';
  document.getElementById('profTabs').style.display=isAM?'none':'';
  document.getElementById('tab-weekly').classList.toggle('active',S.curTab==='weekly');
  document.getElementById('tab-monthly').classList.toggle('active',S.curTab==='monthly');

  renderProfHistory();
  if(S.curTab==='weekly'&&!isAM){
    renderWeeklyTab();
  } else {
    renderMonthlyTab();
  }
}

function switchTab(tab){
  S.curTab=tab;
  document.getElementById('tab-weekly').classList.toggle('active',tab==='weekly');
  document.getElementById('tab-monthly').classList.toggle('active',tab==='monthly');
  if(tab==='weekly')renderWeeklyTab();
  else renderMonthlyTab();
}

function renderProfHistory(){
  const s=S.staff.find(x=>x.id===S.curId); if(!s)return;
  // Find months with data
  const months=[];
  const now=new Date();
  for(let i=0;i<12;i++){
    let m=now.getMonth()+1-i, y=now.getFullYear();
    if(m<=0){m+=12;y--;}
    const rev=S.reviews[rvk(s.id,y,m)];
    const bld=rev?blended(rev):null;
    months.push({m,y,rev,bld});
  }

  let html=`<div class="ph-header"><div class="ph-title">Performance History</div><div class="ph-sub">Click month to view</div></div>`;

  months.filter(({rev,bld})=>rev||bld!==null).forEach(({m,y,rev,bld})=>{
    const active=S.curMonth===m&&S.curYear===y;
    const stars=rev?.stars||0;
    const starsHtml=[1,2,3,4,5].map(i=>`<span class="ms ${i<=stars?'on':''}" onclick="event.stopPropagation();setStar(${i},'${rvk(s.id,y,m)}')"">★</span>`).join('');

    // Show week completion dots
    const weekDots=[1,2,3,4].map(wk=>{
      const done=weekDone(s.id,y,m,wk);
      return `<span style="width:6px;height:6px;border-radius:50%;background:${done?'var(--sage)':'var(--linen)'};display:inline-block;margin-right:2px;"></span>`;
    }).join('');

    html+=`<div class="ph-month ${active?'active':''}" onclick="selectMonth(${m},${y})">
      <div class="phm-nm">${MONTHS[m-1]} ${y}${active?` <span style="font-size:8px;letter-spacing:.1em;color:var(--gold)">CURRENT</span>`:''}${rev?.ai?` <span style="font-size:8px;color:var(--sage)">✓</span>`:''}</div>
      <div class="phm-row">
        <div>
          <div class="phm-cr" style="color:${crColor(bld)}">${bld!==null?bld+'%':'—'}</div>
          <div class="phm-lbl">Blended CR</div>
          <div style="margin-top:4px;">${weekDots}</div>
        </div>
        <div class="phm-stars">${starsHtml}</div>
      </div>
    </div>`;
  });

  html+=`<button class="ph-add-btn" onclick="addPastMonth()">+ Add past month</button>`;
  document.getElementById('profHistory').innerHTML=html;
}

function selectMonth(m,y){
  S.curMonth=m; S.curYear=y;
  document.getElementById('navMonth').value=m;
  document.getElementById('navYear').value=y;
  renderProfHistory();
  if(S.curTab==='weekly')renderWeeklyTab();
  else renderMonthlyTab();
}

function setStar(n,k){
  if(!S.reviews[k])S.reviews[k]={weeks:{},lostPatterns:{},lostNote:'',stars:0};
  S.reviews[k].stars=n; sv(); renderProfHistory();
}

function addPastMonth(){
  const mn=prompt('Add month (1-12):'); const yr=prompt('Year:');
  if(!mn||!yr)return;
  S.curMonth=parseInt(mn); S.curYear=parseInt(yr);
  getMk(S.curId,S.curYear,S.curMonth);
  sv(); renderProfHistory();
  if(S.curTab==='weekly')renderWeeklyTab();
  else renderMonthlyTab();
}

// ═══════════════════════════════════════════════
// WEEKLY TAB
// ═══════════════════════════════════════════════
function renderWeeklyTab(){
  const s=S.staff.find(x=>x.id===S.curId); if(!s)return;
  const rev=getMk(s.id,S.curYear,S.curMonth);

  // Week tabs
  const weekTabsHtml=[1,2,3,4].map(wk=>{
    const done=weekDone(s.id,S.curYear,S.curMonth,wk);
    const active=S.curWeek===wk;
    return `<button class="wk-tab ${active?'active':''} ${done?'done':''}" onclick="selectWeek(${wk})">${done&&!active?'✓ ':''} Wk ${wk}</button>`;
  }).join('');

  const wkData=getWeek(s.id,S.curYear,S.curMonth,S.curWeek);

  // Sales process ratings
  const procHtml=STEPS.map(step=>{
    const val=wkData.proc[step.key]||'';
    return `<tr>
      <td><div class="step-nm">${step.name}</div><div class="step-ds">${step.desc}</div></td>
      <td>
        <div class="rat-btns">
          <button class="rb ${val==='ex'?'r-ex':''}" onclick="setRating('proc','${step.key}','ex')">Excellent</button>
          <button class="rb ${val==='gd'?'r-gd':''}" onclick="setRating('proc','${step.key}','gd')">Good</button>
          <button class="rb ${val==='nw'?'r-nw':''}" onclick="setRating('proc','${step.key}','nw')">Needs Work</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  // Fundamentals
  const fundHtml=FUNDS.map(f=>{
    const key=f.toLowerCase().replace(/[^a-z0-9]/g,'_');
    const val=wkData.fund[key]||'';
    return `<div class="fi">
      <span class="fi-lbl">${f}</span>
      <div class="fi-togs">
        <button class="ftog ${val==='ex'?'f-ex':''}" onclick="setRating('fund','${key}','ex')" title="Excellent">✓ Excellent</button>
        <button class="ftog ${val==='nt'?'f-nt':''}" onclick="setRating('fund','${key}','nt')" title="Neutral">— Neutral</button>
        <button class="ftog ${val==='nw'?'f-nw':''}" onclick="setRating('fund','${key}','nw')" title="Needs Work">✗ Needs Work</button>
      </div>
    </div>`;
  }).join('');

  const html=`<div class="review-content">
    <div class="week-nav">
      <div class="week-nav-title">${MONTHS[S.curMonth-1]} ${S.curYear} — Weekly Assessment</div>
      <div class="week-tabs">${weekTabsHtml}</div>
    </div>

    <div class="rsec">
      <div class="rsec-head"><span class="rsec-title">Sales Process</span><div class="rsec-line"></div></div>
      <div class="rcard" style="padding:0;overflow:hidden;">
        <table class="weekly-grid">
          <thead><tr><th style="width:45%">Step</th><th>Rating</th></tr></thead>
          <tbody>${procHtml}</tbody>
        </table>
      </div>
    </div>

    <div class="rsec">
      <div class="rsec-head"><span class="rsec-title">Fundamentals</span><div class="rsec-line"></div>
        <span style="font-size:9px;color:var(--taupe)">✓ Excellent &nbsp;— Neutral &nbsp;✗ Needs Work</span>
      </div>
      <div class="fund-grid">${fundHtml}</div>
    </div>

    <div class="week-save-bar">
      <div class="week-save-info">Week ${S.curWeek} of 4 · ${MONTHS[S.curMonth-1]} ${S.curYear}</div>
      <button class="btn btn-ink" onclick="saveWeek()">Save Week ${S.curWeek}</button>
    </div>
  </div>`;

  document.getElementById('profReview').innerHTML=html;
}

function selectWeek(wk){
  S.curWeek=wk;
  renderWeeklyTab();
}

function setRating(type,key,val){
  const wk=getWeek(S.curId,S.curYear,S.curMonth,S.curWeek);
  if(wk[type][key]===val){delete wk[type][key];}
  else{wk[type][key]=val;}
  sv();
  // Re-render just the button row
  renderWeeklyTab();
}

function saveWeek(){
  sv();
  renderProfHistory();
  alert(`✓ Week ${S.curWeek} saved for ${MONTHS[S.curMonth-1]} ${S.curYear}`);
}

// ═══════════════════════════════════════════════
// MONTHLY TAB
// ═══════════════════════════════════════════════
function renderMonthlyTab(){
  const s=S.staff.find(x=>x.id===S.curId); if(!s)return;
  const rev=curRev();
  const fC=crCalc(rev.fA,rev.fS);
  const bC=crCalc(rev.bA,rev.bS);
  const bld=blended(rev);
  const isAM=s.role==='Area Manager';
  const isLeader=s.role==='Team Leader';

  // CR stat cards
  const statCards=`<div class="stat-row">
    <div class="scard"><div class="scard-lbl">Blended CR</div><div class="scard-val" style="color:${crColor(bld)}">${bld!==null?bld+'%':'—'}</div>${badg(bld)}</div>
    <div class="scard"><div class="scard-lbl">Formal CR</div><div class="scard-val">${fC!==null?fC+'%':'—'}</div><div class="scard-sub">${rev.fA||0} appts · ${rev.fS||0} sales</div></div>
    ${(parseFloat(rev.bA)||0)>0?`<div class="scard"><div class="scard-lbl">Bridal CR</div><div class="scard-val">${bC!==null?bC+'%':'—'}</div><div class="scard-sub">${rev.bA||0} appts · ${rev.bS||0} sales</div></div>`:''}
  </div>`;

  // Monthly averages table
  const avgTable=`
    <div class="rsec">
      <div class="rsec-head"><span class="rsec-title">Sales Process — Monthly Average</span><div class="rsec-line"></div></div>
      <div class="rcard" style="padding:0;overflow:hidden;">
        <table class="avg-table">
          <thead><tr><th>Step</th><th>Wk 1</th><th>Wk 2</th><th>Wk 3</th><th>Wk 4</th><th>Average</th></tr></thead>
          <tbody>
            ${STEPS.map(step=>{
              const wkDots=[1,2,3,4].map(wk=>{
                const wkData=rev.weeks[wk];
                const v=wkData?.proc?.[step.key];
                if(!v)return`<td><span class="wk-dot wd-blank">—</span></td>`;
                const cls=v==='ex'?'wd-ex':v==='gd'?'wd-gd':'wd-nw';
                const lbl=v==='ex'?'E':v==='gd'?'G':'NW';
                return`<td><span class="wk-dot ${cls}">${lbl}</span></td>`;
              }).join('');
              const avg=avgRating(s.id,S.curYear,S.curMonth,'proc',step.key);
              const avgHtml=avg?`<span class="avg-pill ${avg==='ex'?'b-ex':avg==='gd'?'b-gd':'b-nw'}">${avg==='ex'?'Excellent':avg==='gd'?'Good':'Needs Work'}</span>`:`<span style="color:var(--taupe);font-size:10px;">No data</span>`;
              return`<tr><td><strong>${step.name}</strong></td>${wkDots}<td>${avgHtml}</td></tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="rsec">
      <div class="rsec-head"><span class="rsec-title">Fundamentals — Monthly Average</span><div class="rsec-line"></div></div>
      <div class="fund-grid">
        ${FUNDS.map(f=>{
          const key=f.toLowerCase().replace(/[^a-z0-9]/g,'_');
          const avg=avgRating(s.id,S.curYear,S.curMonth,'fund',key);
          const cls=avg==='ex'?'f-ex':avg==='gd'?'f-nt':avg==='nw'?'f-nw':'';
          const lbl=avg==='ex'?'Excellent':avg==='gd'?'Good':avg==='nw'?'Needs Work':'No data';
          return`<div class="fi"><span class="fi-lbl">${f}</span><span class="ftog ${cls}" style="cursor:default;">${lbl}</span></div>`;
        }).join('')}
      </div>
    </div>`;

  // Lost sale patterns
  const lostHtml=`
    <div class="rsec">
      <div class="rsec-head"><span class="rsec-title">Lost Sale Patterns</span><div class="rsec-line"></div></div>
      ${renderTop3Lost(rev)}
      <div class="rcard" style="padding:0;overflow:hidden;">
        ${LOST.map((r,i)=>{
          const checked=rev.lostPatterns&&rev.lostPatterns[r.label];
          const sn=r.step?STEPS.find(st=>st.key===r.step)?.name:'';
          return`<div class="lp-row ${checked?'checked':''}" onclick="togglePattern('${r.label}',${i})">
            <div class="lp-check">${checked?'✓':''}</div>
            <div class="lp-body">
              <div class="lp-label">${r.label}</div>
              ${r.tip?`<div class="lp-teach">→ ${sn||r.tip}${sn?': '+r.tip:''}</div>`:''}
              ${checked&&r.actions&&r.actions.length?`
                <div class="lp-actions" onclick="event.stopPropagation()">
                  <div class="lp-act-title">Actions to try</div>
                  ${r.actions.map(a=>{
                    const isQ=a.trim().startsWith('<em>');
                    if(isQ)return`<div class="lp-act-quote">"${a.replace(/<em>/g,'').replace(/<\/em>/g,'')}"</div>`;
                    return`<div class="lp-act-item">• ${a.replace(/<[^>]+>/g,'')}</div>`;
                  }).join('')}
                </div>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
      <div style="margin-top:10px;">
        <div style="font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--warm);margin-bottom:5px;">Additional notes</div>
        <textarea style="width:100%;border:1px solid var(--linen);border-radius:6px;padding:8px 10px;font-size:12px;font-family:'DM Sans',sans-serif;background:var(--cream);resize:none;min-height:50px;" placeholder="Any specific context..." onchange="saveLostNote(this.value)">${rev.lostNote||''}</textarea>
      </div>
    </div>`;

  // Positives & Growth
  const pgHtml=renderPG(rev);

  // AI Review section — only Area Manager can generate & send
  const aiHtml=`
    <div class="rsec">
      <div class="rsec-head"><span class="rsec-title">Performance Review</span><div class="rsec-line"></div></div>
      <div class="ai-panel">
        <div class="ai-hdr">
          <div class="ai-title">Monthly Review for ${s.name}</div>
          <div style="display:flex;align-items:center;gap:8px;">
            ${rev.ai?`<button style="padding:3px 8px;font-size:10px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);color:var(--cream);cursor:pointer;border-radius:4px;" onclick="toggleEditAI()">Edit</button>`:''}
            <div class="ai-badge">AI Generated</div>
          </div>
        </div>
        <div id="aiContent">${rev.ai
          ?`<div class="ai-txt" id="aiTxt">${rev.ai}</div><textarea class="ai-editor" id="aiEditor" style="display:none;" onchange="saveAIEdit(this.value)">${rev.ai}</textarea>`
          :`<div style="font-size:12px;color:rgba(250,248,244,.4);line-height:1.7;">Once weekly assessments are complete, the Area Manager can generate and send the monthly review.</div>`
        }</div>
        <div class="ai-acts" id="aiActs">
          ${rev.ai
            ?`<button class="ai-btn ai-btn-gold" onclick="generateReview()">↺ Regenerate</button>
               <button class="ai-btn" onclick="expPDF()">↓ Download PDF</button>
               <button class="ai-btn" onclick="shareWA()">WhatsApp</button>
               <button class="ai-btn" onclick="shareSMS()">SMS</button>`
            :`<button class="ai-btn ai-btn-gold" onclick="generateReview()">Generate Review →</button>`}
        </div>
      </div>
    </div>`;

  // Team section for Team Leaders
  const teamHtml=(isLeader||isAM)?renderTeamSection(s):'';

  document.getElementById('profReview').innerHTML=`<div class="review-content">
    ${statCards}
    ${avgTable}
    ${lostHtml}
    ${pgHtml}
    ${aiHtml}
    ${teamHtml}
  </div>`;
}

function renderTop3Lost(rev){
  const counts=rev.lostReasonCounts||{};
  const ticked=LOST.filter(l=>rev.lostPatterns&&rev.lostPatterns[l.label]);
  const source=Object.keys(counts).length
    ?Object.entries(counts).map(([label,count])=>({label,count,step:(LOST.find(l=>l.label===label)||{}).step}))
    :ticked.map(l=>({label:l.label,count:1,step:l.step}));
  const top3=source.sort((a,b)=>b.count-a.count).slice(0,3);
  if(!top3.length)return'';
  const stepNames={greeting:'Greeting',dresses:'6–8 Dresses',eliminating:'Eliminating',urgency:'Urgency',theone:'The One'};
  return`<div style="background:var(--danger-l);border:1px solid #e8c8c8;border-radius:8px;padding:12px 14px;margin-bottom:12px;">
    <div style="font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--danger);font-weight:700;margin-bottom:8px;">Top Patterns This Month</div>
    ${top3.map((p,i)=>{
      const sn=p.step?stepNames[p.step]||p.step:'';
      return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">
        <div style="width:17px;height:17px;border-radius:50%;background:var(--danger);color:white;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${i+1}</div>
        <div style="font-size:12px;color:var(--deep);font-weight:500;">${p.label}</div>
        ${sn?`<div style="font-size:10px;color:var(--warm);">→ coach on ${sn}</div>`:''}
        ${p.count>1?`<div style="font-size:10px;color:var(--danger);margin-left:auto;">${p.count}×</div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

function renderPG(rev){
  if(!rev.pros)rev.pros=[];
  if(!rev.cons)rev.cons=[];
  return`<div class="rsec">
    <div class="rsec-head"><span class="rsec-title">Positives & Growth Areas</span><div class="rsec-line"></div></div>
    <div class="rcard">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div>
          <div style="font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--sage);margin-bottom:8px;font-weight:700;">Positives</div>
          <div id="prosList">${rev.pros.map((p,i)=>`<div style="font-size:12px;padding:5px 0;border-bottom:1px solid var(--bone);display:flex;justify-content:space-between;"><span>${p.txt}</span><button style="border:none;background:none;color:var(--taupe);cursor:pointer;" onclick="removePG('pros',${i})">×</button></div>`).join('')}</div>
          <div style="display:flex;gap:6px;margin-top:8px;">
            <input id="prosIn" type="text" placeholder="Add positive..." style="flex:1;border:1px solid var(--linen);border-radius:5px;padding:5px 8px;font-size:11px;font-family:'DM Sans',sans-serif;background:var(--cream);">
            <button class="btn btn-sm" onclick="addPG('pros')" style="background:var(--sage-l);border-color:var(--sage);color:var(--sage);">+</button>
          </div>
        </div>
        <div>
          <div style="font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--danger);margin-bottom:8px;font-weight:700;">Growth Areas</div>
          <div id="consList">${rev.cons.map((p,i)=>`<div style="font-size:12px;padding:5px 0;border-bottom:1px solid var(--bone);display:flex;justify-content:space-between;"><span>${p.txt}</span><button style="border:none;background:none;color:var(--taupe);cursor:pointer;" onclick="removePG('cons',${i})">×</button></div>`).join('')}</div>
          <div style="display:flex;gap:6px;margin-top:8px;">
            <input id="consIn" type="text" placeholder="Add growth area..." style="flex:1;border:1px solid var(--linen);border-radius:5px;padding:5px 8px;font-size:11px;font-family:'DM Sans',sans-serif;background:var(--cream);">
            <button class="btn btn-sm" onclick="addPG('cons')" style="background:var(--danger-l);border-color:var(--danger);color:var(--danger);">+</button>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function addPG(type){
  const inp=document.getElementById(type+'In');
  const val=inp.value.trim(); if(!val)return;
  const rev=curRev();
  if(!rev[type])rev[type]=[];
  rev[type].push({txt:val,ts:new Date().toLocaleDateString('en-AU')});
  inp.value=''; sv(); renderMonthlyTab();
}
function removePG(type,i){const rev=curRev();rev[type].splice(i,1);sv();renderMonthlyTab();}

function renderTeamSection(s){
  const teamStaff=S.staff.filter(ts=>ts.store===s.store&&ts.id!==s.id&&ts.role!=='Area Manager');
  if(!teamStaff.length)return'';
  const stepNames={greeting:'Greeting',dresses:'6–8 Dresses',eliminating:'Eliminating',urgency:'Urgency',theone:'The One'};

  let storeFa=0,storeFs=0,storeBa=0,storeBs=0;
  teamStaff.forEach(ts=>{
    const tr=getMk(ts.id,S.curYear,S.curMonth);
    storeFa+=parseFloat(tr.fA)||0;storeFs+=parseFloat(tr.fS)||0;
    storeBa+=parseFloat(tr.bA)||0;storeBs+=parseFloat(tr.bS)||0;
  });
  const stTotal=storeFa+storeBa,stSales=storeFs+storeBs;
  const stCR=stTotal>0?Math.round(stSales/stTotal*100):null;
  const rev=curRev();

  return`<div class="rsec">
    <div class="rsec-head"><span class="rsec-title">My Team — ${s.store}</span><div class="rsec-line"></div></div>
    <div style="background:var(--bone);border-radius:8px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:20px;">
      <div>
        <div style="font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--warm);">Store Blended CR</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:30px;color:${crColor(stCR)};line-height:1;">${stCR!==null?stCR+'%':'—'}</div>
        <div style="font-size:10px;color:var(--warm);">${stTotal} appts · ${stSales} sales · ${teamStaff.length} stylists</div>
      </div>
    </div>
    ${teamStaff.map(ts=>{
      const tr=getMk(ts.id,S.curYear,S.curMonth);
      const tTotal=(parseFloat(tr.fA)||0)+(parseFloat(tr.bA)||0);
      const tSales=(parseFloat(tr.fS)||0)+(parseFloat(tr.bS)||0);
      const tCR=tTotal>0?Math.round(tSales/tTotal*100):null;
      const lostCounts=tr.lostReasonCounts||{};
      const top3=Object.entries(lostCounts).sort((a,b)=>b[1]-a[1]).slice(0,3);
      const tIni=ts.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
      return`<div style="border:1px solid var(--linen);border-radius:8px;padding:12px 14px;background:white;margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:${top3.length?'10px':'0'};">
          <div style="width:34px;height:34px;border-radius:50%;background:var(--bone);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--warm);flex-shrink:0;">${tIni}</div>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:500;color:var(--deep);">${ts.name}</div>
            <div style="font-size:10px;color:var(--warm);">${ts.role||'Casual Stylist'}</div>
          </div>
          <div style="padding:3px 12px;border-radius:20px;background:${crBgColor(tCR)};color:${crColor(tCR)};font-size:13px;font-weight:500;">${tCR!==null?tCR+'%':'No data'}</div>
        </div>
        ${top3.length?`<div style="border-top:1px solid var(--bone);padding-top:8px;">
          ${top3.map(([label,count],i)=>{
            const match=LOST.find(l=>l.label===label);
            const step=match?.step?stepNames[match.step]||match.step:'';
            return`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
              <span style="width:15px;height:15px;border-radius:50%;background:var(--danger-l);color:var(--danger);font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${i+1}</span>
              <span style="font-size:11px;color:var(--deep);">${label}</span>
              ${step?`<span style="font-size:9px;color:var(--warm);">→ ${step}</span>`:''}
              <span style="font-size:10px;color:var(--danger);margin-left:auto;">${count}×</span>
            </div>`;
          }).join('')}
        </div>`:''}
      </div>`;
    }).join('')}

    <div class="ai-panel" style="margin-top:14px;">
      <div class="ai-hdr">
        <div class="ai-title">Team Summary — ${s.store}</div>
        <div class="ai-badge">AI Generated</div>

      <div class="ai-acts">
        <button class="ai-btn ai-btn-gold" onclick="generateTeamReview()">${rev.aiTeam?'↺ Regenerate Team Summary':'Generate Team Summary →'}</button>
      </div>

  </div>`;
}

async function generateReview(){
  const s=S.staff.find(x=>x.id===S.curId); if(!s)return;
  const rev=curRev();
  const bld=blended(rev);
  const fC=crCalc(rev.fA,rev.fS);
  const mn=MONTHS[S.curMonth-1];

  const procAvgs=STEPS.map(st=>{
    const avg=avgRating(s.id,S.curYear,S.curMonth,'proc',st.key);
    return`${st.name}: ${avg?avg==='ex'?'Excellent':avg==='gd'?'Good':'Needs Work':'No data'}`;
  }).join('\n');

  const fundAvgs=FUNDS.map(f=>{
    const key=f.toLowerCase().replace(/[^a-z0-9]/g,'_');
    const avg=avgRating(s.id,S.curYear,S.curMonth,'fund',key);
    return avg&&avg!=='nt'?`${f}: ${avg==='ex'?'Excellent':'Needs Work'}`:'';
  }).filter(Boolean).join('\n');

  const checkedLost=LOST.filter(r=>rev.lostPatterns&&rev.lostPatterns[r.label]);
  const lostL=checkedLost.length
    ?checkedLost.map(r=>{const sn=r.step?STEPS.find(s=>s.key===r.step)?.name:'';return`${r.label}${sn?' → '+sn:''}`;}).join('\n')
    :'None identified';

  const prosText=(rev.pros||[]).map(p=>p.txt).join(', ')||'None noted';
  const consText=(rev.cons||[]).map(p=>p.txt).join(', ')||'None noted';

  const prompt=`You are writing a monthly performance review for ${s.name}, a ${s.role||'Casual Stylist'} at Studio Minc — a premium prom, formalwear and bridal boutique in ${s.store}, Australia.

MONTH: ${mn} ${S.curYear}

CONVERSION RATES:
- Blended: ${bld!==null?bld+'%':'not recorded'}
- Formal: ${fC!==null?fC+'%':'not recorded'} (${rev.fA||0} appts, ${rev.fS||0} sales)

PERFORMANCE STANDARDS — be honest:
- 65%+ = Excellent. Acknowledge genuinely.
- 50–64% = Meets standard. Encourage to push further.
- Below 50% = Below standard. Be kind but clear — do NOT describe as good/solid/decent. Frame as an opportunity.

SALES PROCESS AVERAGES (from weekly assessments):
${procAvgs}

FUNDAMENTALS HIGHLIGHTS:
${fundAvgs||'No data recorded'}

POSITIVES: ${prosText}
GROWTH AREAS: ${consText}
LOST SALE PATTERNS: ${lostL}
${rev.lostNote?`Additional context: ${rev.lostNote}`:''}

Write a short performance review addressed directly to ${s.name} (use "you"). Do NOT repeat numbers — focus on meaning and action.

3 short paragraphs only:
1. Honest one-sentence acknowledgement of the month and their CR — accurate about whether it meets the standard.
2. What they're doing well — specific and genuine.
3. One or two focus areas for next month — direct, clear, referencing actual sales process steps and real actions (stock urgency, getting back in the dress, trusting their gut language).

Tone: Best manager they've ever had. Warm but honest. No fluff. No bullet points. Max 150 words.`;

  document.getElementById('aiContent').innerHTML=`<div class="ai-dots"><span></span><span></span><span></span></div>`;
  document.getElementById('aiActs').innerHTML='';

  try{
    const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const txt=data.content?.[0]?.text||'Could not generate.';
    rev.ai=txt; sv(); renderProfHistory();
    document.getElementById('aiContent').innerHTML=`<div class="ai-txt" id="aiTxt">${txt}</div><textarea class="ai-editor" id="aiEditor" style="display:none;" onchange="saveAIEdit(this.value)">${txt}</textarea>`;
    document.getElementById('aiActs').innerHTML=`<button class="ai-btn ai-btn-gold" onclick="generateReview()">↺ Regenerate</button><button class="ai-btn" onclick="expPDF()">↓ Download PDF</button><button class="ai-btn" onclick="shareWA()">WhatsApp</button><button class="ai-btn" onclick="shareSMS()">SMS</button>`;
    const s2=S.staff.find(x=>x.id===S.curId);
    if(s2?.role==='Team Leader')await generateTeamReview();
  }catch(e){
    document.getElementById('aiContent').innerHTML=`<div style="color:#E88;font-size:12px;">Error generating. Check connection and try again.</div>`;
    document.getElementById('aiActs').innerHTML=`<button class="ai-btn ai-btn-gold" onclick="generateReview()">Try Again</button>`;
  }
}

async function generateTeamReview(){
  const s=S.staff.find(x=>x.id===S.curId); if(!s)return;
  const rev=curRev();
  const teamStaff=S.staff.filter(ts=>ts.store===s.store&&ts.id!==s.id&&ts.role!=='Area Manager');
  const stepNames={greeting:'Greeting',dresses:'6–8 Dresses',eliminating:'Eliminating',urgency:'Urgency',theone:'The One'};

  let storeFa=0,storeFs=0,storeBa=0,storeBs=0;
  const teamSummary=teamStaff.map(ts=>{
    const tr=getMk(ts.id,S.curYear,S.curMonth);
    storeFa+=parseFloat(tr.fA)||0;storeFs+=parseFloat(tr.fS)||0;
    storeBa+=parseFloat(tr.bA)||0;storeBs+=parseFloat(tr.bS)||0;
    const tTotal=(parseFloat(tr.fA)||0)+(parseFloat(tr.bA)||0);
    const tSales=(parseFloat(tr.fS)||0)+(parseFloat(tr.bS)||0);
    const tCR=tTotal>0?Math.round(tSales/tTotal*100):null;
    const lostCounts=tr.lostReasonCounts||{};
    const top3=Object.entries(lostCounts).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([label])=>{
      const match=LOST.find(l=>l.label===label);
      return`${label}${match?.step?' (→ '+stepNames[match.step]+')':''}`;
    });
    return`${ts.name}: ${tCR!==null?tCR+'% CR':'no data'}${top3.length?' | Top lost: '+top3.join(', '):''}`;
  }).join('\n');

  const stTotal=storeFa+storeBa,stSales=storeFs+storeBs;
  const stCR=stTotal>0?Math.round(stSales/stTotal*100):null;

  const prompt=`You are writing a private team performance summary for ${s.name}, Team Leader at Studio Minc ${s.store}, for ${MONTHS[S.curMonth-1]} ${S.curYear}.

Store blended CR: ${stCR!==null?stCR+'%':'unknown'} (standard: 50%+ meets expectations, 65%+ excellent, below 50% needs attention)
Team:
${teamSummary}

Write a concise 2-3 paragraph summary (max 150 words) covering:
1. Overall store performance — honest about whether it meets the standard
2. Who needs coaching attention and what specific skills to focus on (reference lost sale patterns and sales process steps)
3. Positive highlights to acknowledge

Tone: Warm but direct manager notes. Private — for the Team Leader's eyes only.`;

  const el=document.getElementById('aiTeamContent');
  if(el)el.innerHTML=`<div class="ai-dots"><span></span><span></span><span></span></div>`;

  try{
    const resp=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:prompt}]})});
    const data=await resp.json();
    const txt=data.content?.[0]?.text||'Could not generate.';
    rev.aiTeam=txt; sv();
    if(el)el.innerHTML=`<div class="ai-txt">${txt}</div>`;
  }catch(e){
    if(el)el.innerHTML=`<div style="color:rgba(255,255,255,.5);">Failed to generate. Try again.</div>`;
  }
}

async function expPDF(){

  const {jsPDF}=window.jspdf; const doc=new jsPDF({unit:'mm',format:'a4'});

  // Header

  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(140,126,106);

  };

  // CR Stats
  const fC=crCalc(rev.fA,rev.fS); const bC=crCalc(rev.bA,rev.bS); const bld=blended(rev);
  y=secLabel('Conversion Rates',y);
  const stats=[
    {l:'Blended CR',v:bld!==null?bld+'%':'—'},
    {l:'Formal CR',v:fC!==null?fC+'%':'—',s:`${rev.fA||0} appts · ${rev.fS||0} sales`},
    {l:'Bridal CR',v:bC!==null?bC+'%':'—',s:`${rev.bA||0} appts · ${rev.bS||0} sales`},
  ];
  const colW=(pageW-30)/3;
  stats.forEach((st,i)=>{
    const x=15+i*colW;
    doc.setFontSize(8); doc.setTextColor(140,126,106); doc.setFont('helvetica','normal');
    doc.text(st.l,x,y);
    doc.setFontSize(18); doc.setFont('times','normal'); doc.setTextColor(28,23,16);
    doc.text(st.v,x,y+8);
    if(st.s){doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(140,126,106);doc.text(st.s,x,y+13);}
  });
  y+=22;

  // Monthly averages
  if(y>pageH-40){doc.addPage();y=20;}
  y=secLabel('Sales Process — Monthly Averages',y);
  const avgMap={'ex':'Excellent','gd':'Good','nw':'Needs Work'};
  STEPS.forEach(step=>{
    if(y>pageH-10){doc.addPage();y=20;}
    const avg=avgRating(s.id,S.curYear,S.curMonth,'proc',step.key);
    doc.setFontSize(8); doc.setTextColor(50,42,35); doc.setFont('helvetica','normal');
    doc.text(step.name,15,y);
    if(avg){
      const col=avg==='ex'?[92,112,85]:avg==='gd'?[138,112,0]:[196,80,80];
      doc.setTextColor(...col); doc.setFont('helvetica','bold');
      doc.text(avgMap[avg],pageW-15,y,{align:'right'});
    }
    y+=5;
  });
  y+=4;

  // Lost sale patterns
  const checkedP=LOST.filter(r=>rev.lostPatterns&&rev.lostPatterns[r.label]);
  if(checkedP.length){
    if(y>pageH-40){doc.addPage();y=20;}
    y=secLabel('Lost Sale Patterns & Coaching Actions',y);
    checkedP.forEach(r=>{
      if(y>pageH-30){doc.addPage();y=20;}
      const sn=r.step?STEPS.find(st=>st.key===r.step)?.name:'';
      doc.setFillColor(245,224,224); doc.rect(15,y-3,pageW-30,6,'F');
      doc.setFontSize(8); doc.setTextColor(196,80,80); doc.setFont('helvetica','bold');
      doc.text(`${r.label}${sn?' → '+sn:''}`,17,y+1); y+=7;
      if(r.tip){
        doc.setFontSize(7); doc.setTextColor(140,126,106); doc.setFont('helvetica','italic');
        doc.text(`Principle: ${r.tip}`,17,y); y+=5;
      }
      if(r.actions&&r.actions.length){
        r.actions.forEach(a=>{
          if(y>pageH-10){doc.addPage();y=20;}
          const isQ=a.trim().startsWith('<em>');
          const clean=a.replace(/<em>/g,'').replace(/<\/em>/g,'').replace(/<[^>]+>/g,'');
          if(isQ){
            doc.setFontSize(7.5); doc.setTextColor(61,51,41); doc.setFont('helvetica','italic');
            const lines=doc.splitTextToSize(`  "${clean}"`,pageW-40);
            lines.forEach(l=>{if(y>pageH-8){doc.addPage();y=20;}doc.text(l,22,y);y+=4.5;});
          } else {
            doc.setFontSize(7); doc.setTextColor(80,70,60); doc.setFont('helvetica','normal');
            const lines=doc.splitTextToSize('• '+clean,pageW-36);
            lines.forEach(l=>{if(y>pageH-8){doc.addPage();y=20;}doc.text(l,19,y);y+=4;});
          }
        });
      }
      y+=4;
    });
    y+=3;
  }

  // Written review

  doc.setDrawColor(220,214,205); doc.setLineWidth(0.3); doc.line(15,y,pageW-15,y); y+=2;
  doc.setFillColor(28,23,16); doc.rect(15,y,pageW-30,7,'F');

    if(y>pageH-16){doc.addPage();y=20;}
    doc.text(line,15,y); y+=5.5;
  });

  // Team section for Team Leaders
  if((s.role==='Team Leader'||s.role==='Area Manager')&&rev.aiTeam){
    doc.addPage(); y=20;
    doc.setFillColor(28,23,16); doc.rect(0,0,pageW,14,'F');
    doc.setFontSize(9); doc.setTextColor(250,248,244); doc.setFont('helvetica','bold');
    doc.text(`MY TEAM — ${s.store.toUpperCase()}`,15,9);
    doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(140,126,106);
    doc.text('MANAGER USE ONLY · PRIVATE',pageW-15,9,{align:'right'}); y=24;

    const teamStaff=S.staff.filter(ts=>ts.store===s.store&&ts.id!==s.id&&ts.role!=='Area Manager');
    let sFa=0,sFs=0,sBa=0,sBs=0;
    teamStaff.forEach(ts=>{const tr=getMk(ts.id,S.curYear,S.curMonth);sFa+=parseFloat(tr.fA)||0;sFs+=parseFloat(tr.fS)||0;sBa+=parseFloat(tr.bA)||0;sBs+=parseFloat(tr.bS)||0;});
    const sTot=sFa+sBa,sSal=sFs+sBs;
    const sCR=sTot>0?Math.round(sSal/sTot*100):null;
    doc.setFontSize(8); doc.setTextColor(50,42,35); doc.setFont('helvetica','bold');
    doc.text(`Store Blended CR: ${sCR!==null?sCR+'%':'—'}  ·  ${sTot} appts  ·  ${sSal} sales  ·  ${teamStaff.length} stylists`,15,y); y+=10;

    const stepNamesP={greeting:'Greeting',dresses:'6–8 Dresses',eliminating:'Eliminating',urgency:'Urgency',theone:'The One'};
    teamStaff.forEach(ts=>{
      if(y>pageH-24){doc.addPage();y=20;}

      const tTot=(parseFloat(tr.fA)||0)+(parseFloat(tr.bA)||0),tSal=(parseFloat(tr.fS)||0)+(parseFloat(tr.bS)||0);
      const tCR=tTot>0?Math.round(tSal/tTot*100):null;
      const crC=tCR===null?[140,126,106]:tCR>=65?[92,112,85]:tCR>=50?[138,112,0]:[196,80,80];
      doc.setFillColor(242,239,232); doc.rect(15,y-3,pageW-30,6,'F');
      doc.setFontSize(8); doc.setTextColor(...crC); doc.setFont('helvetica','bold');
      doc.text(`${ts.name}  ${tCR!==null?tCR+'%':'No data'}`,17,y+1);

      doc.text(`${tTot} appts · ${tSal} sales`,pageW-20,y+1,{align:'right'}); y+=8;
      const lostCounts=tr.lostReasonCounts||{};
      Object.entries(lostCounts).sort((a,b)=>b[1]-a[1]).slice(0,3).forEach(([label,count],i)=>{
        if(y>pageH-6){doc.addPage();y=20;}
        const match=LOST.find(l=>l.label===label);
        const step=match?.step?stepNamesP[match.step]||match.step:'';

        doc.text(`${i+1}. ${label}${step?' → '+step:''}  (${count}×)`,19,y); y+=4.5;

    doc.splitTextToSize(rev.aiTeam,pageW-30).forEach(line=>{

  const id=document.getElementById('sfId').value; if(!id)return;
  const s=S.staff.find(x=>x.id===id); if(!s)return;
  if(!confirm(`Remove ${s.name}? This cannot be undone.`))return;
  S.staff=S.staff.filter(x=>x.id!==id);
  sv(); closeModal('staffModal'); showHome();
}

// ═══════════════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════════════
function openSupaModal(){
  document.getElementById('supaUrl').value=localStorage.getItem(SUK)||'';
  document.getElementById('supaKey').value=localStorage.getItem(SKK)||'';
  document.getElementById('supaModal').style.display='flex';
}
function saveSupa(){
  localStorage.setItem(SUK,document.getElementById('supaUrl').value.trim());
  localStorage.setItem(SKK,document.getElementById('supaKey').value.trim());
  closeModal('supaModal'); checkSupa();
}
function checkSupa(){
  const u=localStorage.getItem(SUK),k=localStorage.getItem(SKK);
  const el=document.getElementById('supaStatus');
  if(u&&k){el.textContent='● Connected';el.className='sd ok';}
  else{el.textContent='● Not connected';el.className='sd no';}
}
async function syncSupa(){
  const u=localStorage.getItem(SUK),k=localStorage.getItem(SKK); if(!u||!k){openSupaModal();return;}
  const headers={'apikey':k,'Authorization':`Bearer ${k}`};
  const storeMap={'gc':'Gold Coast','syd':'Sydney','bne':'Brisbane'};

  const staffRes=await fetch(`${u}/rest/v1/staff?select=id,name,store_id`,{headers});
  if(!staffRes.ok)throw new Error(`Staff fetch failed: ${staffRes.status}`);
  const staffData=await staffRes.json();

  staffData.forEach(row=>{
    const existing=S.staff.find(s=>s.id===String(row.id));
    if(!existing){
      S.staff.push({id:String(row.id),name:row.name||'Unknown',role:'Casual Stylist',store:storeMap[row.store_id]||row.store_id||'Gold Coast',phone:'',photo:null});
    } else {
      existing.store=storeMap[row.store_id]||row.store_id||existing.store;
    }
  });

  const monthsToSync=[];
  for(let i=0;i<3;i++){
    let m=S.curMonth-i,y=S.curYear;
    if(m<=0){m+=12;y--;}
    monthsToSync.push({m,y});
  }

  let totalAppts=0;
  for(const {m,y} of monthsToSync){
    const mStr=String(m).padStart(2,'0');
    const dateFrom=`${y}-${mStr}-01`;
    const lastDay=new Date(y,m,0).getDate();
    const dateTo=`${y}-${mStr}-${lastDay}`;
    const apptRes=await fetch(`${u}/rest/v1/appointments?select=staff_name,outcome,type,reason,date&date=gte.${dateFrom}&date=lte.${dateTo}&limit=2000`,{headers});
    if(!apptRes.ok)continue;
    const appts=await apptRes.json();
    totalAppts+=appts.length;

    const byStaff={};
    appts.forEach(a=>{
      const sName=(a.staff_name||'').trim();
      if(!sName||sName==='EMPTY')return;
      if(!byStaff[sName])byStaff[sName]={fA:0,fS:0,bA:0,bS:0,lostReasons:{}};
      const d=byStaff[sName];
      const outcome=(a.outcome||'').trim();
      if(!outcome||outcome==='EMPTY')return; // skip unlogged appointments
      const isBridal=a.type&&(a.type.toLowerCase()==='wedding'||a.type.toLowerCase()==='bridal');
      // Match showroom app exactly:
      // Served = ALL appointments with any outcome (P, C, CX, NS all count)
      // Sold = outcome P or C only
      const isSold=outcome==='P'||outcome==='C';
      if(isBridal){d.bA++;if(isSold)d.bS++;}
      else{d.fA++;if(isSold)d.fS++;}
      if(!isSold&&a.reason&&a.reason!=='EMPTY'){
        d.lostReasons[a.reason]=(d.lostReasons[a.reason]||0)+1;
      }
    });

    console.log(`${y}-${mStr}: fetched ${appts.length} appointments`);
    console.log('byStaff keys:', Object.keys(byStaff));
    Object.entries(byStaff).forEach(([name,d])=>{
      const tot=d.fA+d.bA, sold=d.fS+d.bS;
      console.log(`  ${name}: ${tot} appts, ${sold} sold, CR=${tot>0?Math.round(sold/tot*100)+'%':'—'}`);
    });

    S.staff.forEach(st=>{
      // Try full name match first, then first name match
      const d=byStaff[st.name]||byStaff[st.name.split(' ')[0]];
      if(!d)return;
      const rev=getMk(st.id,y,m);
      rev.fA=d.fA;rev.fS=d.fS;rev.bA=d.bA;rev.bS=d.bS;
      if(!rev.lostPatterns)rev.lostPatterns={};
      Object.entries(d.lostReasons).forEach(([reason])=>{
        const match=LOST.find(l=>l.label.toLowerCase()===reason.toLowerCase());
        if(match)rev.lostPatterns[match.label]=true;
      });
      rev.lostReasonCounts=d.lostReasons;
    });
  }

  sv(); renderHome();
  if(S.curId)renderProfile();
  return{staffCount:staffData.length,totalAppts};
}

async function manualSync(){
  const u=localStorage.getItem(SUK),k=localStorage.getItem(SKK);
  if(!u||!k){openSupaModal();return;}
  try{
    const result=await syncSupa();
    if(result)alert(`✓ Synced last 3 months\n${result.staffCount} staff · ${result.totalAppts} appointments`);
  }catch(e){alert(`Sync failed: ${e.message}`);}
}

async function autoSync(){
  const u=localStorage.getItem(SUK),k=localStorage.getItem(SKK);
  if(!u||!k)return;
  try{await syncSupa();}catch(e){console.log('Auto-sync failed:',e.message);}
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function closeModal(id){document.getElementById(id).style.display='none';}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function init(){
  ld();
  initNav();
  checkSupa();
  renderHome();
  autoSync().then(()=>renderHome());
}

init();
</script>
